x-app-env: &app-env
  APP_ENV: "dev"
  APP_SECRET: "!ChangeThisAppSecretKey!"
  DATABASE_URL: "postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-!ChangeMe!}@database:5432/${POSTGRES_DB:-app}?serverVersion=${POSTGRES_VERSION:-18}&charset=utf8"
  MERCURE_URL: "http://mercure/.well-known/mercure"
  MERCURE_PUBLIC_URL: "http://localhost:9080/.well-known/mercure"
  MERCURE_PUBLISHER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
  MERCURE_SUBSCRIBER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
  TEMPORAL_ADDRESS: "temporal:7233"

services:
  app:
    build: .
    image: temporal-pizza
    working_dir: /app
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    environment:
      <<: *app-env
    depends_on:
      database:
        condition: service_healthy
      temporal:
        condition: service_started

  database:
    image: postgres:${POSTGRES_VERSION:-18}-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-!ChangeMe!}
      POSTGRES_USER: ${POSTGRES_USER:-app}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-app}", "-U", "${POSTGRES_USER:-app}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw

  mercure:
    image: dunglas/mercure
    environment:
      SERVER_NAME: ":80"
      MERCURE_PUBLISHER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
      MERCURE_SUBSCRIBER_JWT_KEY: "!ChangeThisMercureHubJWTSecretKey!"
      MERCURE_EXTRA_DIRECTIVES: |
        anonymous 1
        cors_origins *
    ports:
      - "9080:80"
    command: /usr/bin/caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - mercure_data:/data
      - mercure_config:/config
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz"]
      timeout: 5s
      retries: 5
      start_period: 60s

  temporal:
    image: temporalio/temporal:latest
    ports:
      - "7233:7233"
      - "8233:8233"
    command: server start-dev --ip 0.0.0.0 --db-filename /temporal-data/temporal.db
    volumes:
      - temporal_data:/temporal-data

volumes:
  database_data:
  mercure_data:
  mercure_config:
  temporal_data:

